name = "electrician-estimate-worker"
main = "src/worker/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Local dev: run `wrangler dev` alongside `vite dev`
[dev]
port = 8787

# ─── Secrets ───────────────────────────────────────────────────────────────────
# Set each with: wrangler secret put SECRET_NAME
# Or for local dev, add to .dev.vars (gitignored)
#
#   ANTHROPIC_API_KEY   — Claude API key
#   OPENAI_API_KEY      — OpenAI key for Whisper transcription
#   HCP_API_KEY         — HouseCall Pro API key
#   ACCESS_CODE         — PIN for the front-end access gate (leave unset to disable gate)
#   ALLOWED_ORIGIN      — your Pages URL, e.g. https://estimate.clarity-ai-consulting.com
